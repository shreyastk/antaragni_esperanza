<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esperanza | Hogwarts Edition — Antaragni X Esperanza</title>
  <meta name="description"
    content="Esperanza – the Hogwarts Edition cultural fest by Antaragni. Register for events in Music, Dance, Drama, Fashion, Art, Quiz, and more.">

  <!-- Canonical & mobile theme -->
  <link rel="canonical" href="https://antaragni-esperanza.pages.dev/">
  <meta name="theme-color" content="#120a1f">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://antaragni-esperanza.pages.dev/">
  <meta property="og:title" content="Esperanza | Hogwarts Edition — Antaragni X Esperanza">
  <meta property="og:description"
    content="Register for Music, Dance, Drama, Fashion, Art, Quiz &amp; more at Esperanza – Hogwarts Edition by Antaragni, DSATM.">
  <meta property="og:image" content="https://antaragni-esperanza.pages.dev/brochure.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:alt" content="Esperanza Hogwarts Edition Brochure">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet">

  <style>
    /* ─── RESET ─── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201, 168, 76, 0.18);
      --cream: #f5edd6;
      --dark: #120a1f;
      --card-bg: rgba(18, 10, 31, 0.60);
      --nav-h: 56px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: url("bg.png") no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      color: var(--cream);
      overflow-x: hidden;
    }

    /* ─── DARK OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg,
          rgba(8, 3, 18, 0.82) 0%,
          rgba(25, 8, 45, 0.70) 50%,
          rgba(8, 3, 18, 0.88) 100%);
      z-index: 0;
      pointer-events: none;
    }

    /* ─── MAGIC PARTICLE STARS ─── */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--gold-light);
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--dur, 4s) var(--delay, 0s) infinite ease-in-out;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0;
        transform: scale(0.6);
      }

      50% {
        opacity: var(--op, 0.7);
        transform: scale(1.4);
      }
    }

    /* ─── STICKY NAV ─── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 20px;
      background: rgba(8, 3, 18, 0.78);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201, 168, 76, 0.18);
    }

    .nav a {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-decoration: none;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 30px;
      border: 1px solid transparent;
      transition: border-color 0.25s, color 0.25s, background 0.25s;
    }

    .nav a:hover {
      border-color: var(--gold);
      color: var(--gold-light);
      background: rgba(201, 168, 76, 0.08);
    }

    .nav-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.4;
      flex-shrink: 0;
    }

    /* ─── MAIN WRAPPER ─── */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: calc(var(--nav-h) + 48px) 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    /* ─── HERO / HEADER ─── */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding-bottom: 10px;
    }

    .header img {
      width: 320px;
      max-width: 88%;
      filter: drop-shadow(0 4px 32px rgba(201, 168, 76, 0.55));
      animation: floatLogo 5s ease-in-out infinite;
    }

    @keyframes floatLogo {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .hero-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      color: var(--gold-light);
      text-transform: uppercase;
    }

    .hero-college {
      font-family: 'Lato', sans-serif;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--cream);
      opacity: 0.6;
      text-transform: uppercase;
    }


    /* ─── DIVIDER ─── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.4;
      flex-shrink: 0;
    }

    .divider-ornament {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .divider-ornament .divider {
      flex: 1;
    }

    .divider-ornament .gem {
      width: 7px;
      height: 7px;
      background: var(--gold);
      border-radius: 1px;
      transform: rotate(45deg);
      opacity: 0.65;
      flex-shrink: 0;
    }

    /* ─── SECTION TITLE ─── */
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--gold-light);
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(201, 168, 76, 0.45);
      position: relative;
    }

    .section-title::after {
      content: '';
      display: block;
      width: 52px;
      height: 2px;
      background: var(--gold);
      margin: 10px auto 0;
      border-radius: 2px;
      opacity: 0.75;
    }

    .section-sub {
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--cream);
      text-align: center;
      text-transform: uppercase;
      opacity: 0.55;
      margin-top: 6px;
    }

    /* ─── BROCHURE ─── */
    .brochure {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 0 1.5px rgba(201, 168, 76, 0.28);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      display: block;
      position: relative;
    }

    .brochure::after {
      content: '↗ View Full Brochure';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(to top, rgba(8, 3, 18, 0.90), transparent);
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .brochure:hover::after {
      opacity: 1;
    }

    .brochure img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
    }

    .brochure:hover {
      transform: scale(1.018);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.75), 0 0 0 2px rgba(201, 168, 76, 0.55);
    }

    .brochure:hover img {
      transform: scale(1.03);
    }

    /* ─── EVENT GRID ─── */
    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    /* ─── EVENT CARD ─── */
    .event {
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 28px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(201, 168, 76, 0.18);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      display: block;
      position: relative;
    }

    .event::after {
      content: 'Register ↗';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px;
      background: linear-gradient(to top, rgba(8, 3, 18, 0.92), transparent);
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .event:hover::after {
      opacity: 1;
    }

    .event.event-location::after {
      content: 'Get Location ↗';
    }

    .event img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
    }

    .event:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(201, 168, 76, 0.5);
    }

    .event:hover img {
      transform: scale(1.06);
    }

    /* ─── SCROLL-REVEAL ─── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── FOOTER ─── */
    .footer {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding-top: 10px;
    }

    .footer-logo {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .footer-links {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .footer-links a {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-decoration: none;
      text-transform: uppercase;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .footer-links a:hover {
      opacity: 1;
    }

    .footer-copy {
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      opacity: 0.35;
      color: var(--gold-light);
    }

    /* ─── MOBILE ─── */

    /* Prevent blank page if JS is slow — reveal elements after a short delay */
    @keyframes fadeInFallback {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reveal {
      animation: fadeInFallback 0.8s ease 0.3s both;
    }

    .reveal.visible {
      animation: none;
      opacity: 1;
      transform: translateY(0);
    }

    /* Tablet */
    @media (max-width: 700px) {
      :root {
        --nav-h: 48px;
      }

      /* Nav — scrollable row */
      .nav {
        gap: 2px;
        padding: 0 12px;
        overflow-x: auto;
        justify-content: flex-start;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .nav::-webkit-scrollbar {
        display: none;
      }

      .nav a {
        font-size: 0.62rem;
        padding: 6px 12px;
        letter-spacing: 0.1em;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .nav-dot {
        flex-shrink: 0;
      }

      /* Hero */
      .wrapper {
        padding-left: 16px;
        padding-right: 16px;
        gap: 28px;
      }

      .header img {
        width: 260px;
      }

      .hero-subtitle {
        font-size: 0.85rem;
        letter-spacing: 0.22em;
      }

      .hero-college {
        font-size: 0.7rem;
      }


      /* Section titles */
      .section-title {
        font-size: 1.1rem;
        letter-spacing: 0.12em;
      }

      .section-sub {
        font-size: 0.7rem;
      }

      /* Event grid — 2 cols */
      .container {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .event {
        border-radius: 10px;
      }

      /* Footer */
      .footer {
        gap: 10px;
      }

      .footer-logo {
        font-size: 0.85rem;
      }

      .footer-links {
        gap: 14px;
      }

      .footer-links a {
        font-size: 0.6rem;
      }
    }

    /* Small phones */
    @media (max-width: 420px) {
      .wrapper {
        gap: 22px;
      }

      .header img {
        width: 200px;
      }

      .hero-subtitle {
        font-size: 0.75rem;
      }


      /* Event grid — 1 col so images are big & tappable */
      .container {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .event::after {
        opacity: 0.85;
      }

      /* always show label on touch */

      /* Touch‑friendly nav */
      .nav a {
        padding: 8px 12px;
        min-height: 44px;
        display: flex;
        align-items: center;
      }
    }
  </style>
</head>

<body>

  <!-- ▸ STARS -->

  <script>
    /* ── STARS ── */
    try {
      const starsEl = document.getElementById('stars');
      if (starsEl) {
        for (let i = 0; i < 90; i++) {
          const s = document.createElement('div');
          s.className = 'star';
          s.style.cssText = `
            left:${Math.random() * 100}%;
            top:${Math.random() * 100}%;
            --dur:${3 + Math.random() * 5}s;
            --delay:${Math.random() * 6}s;
            --op:${0.3 + Math.random() * 0.6};
            width:${1 + Math.random() * 2.5}px;
            height:${1 + Math.random() * 2.5}px;
          `;
          starsEl.appendChild(s);
        }
      }
    } catch (err) { console.error('Stars error:', err); }
  </script>

  <script>
    /* ── SCROLL-REVEAL ── */
    try {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            observer.unobserve(e.target);
          }
        });
      }, { threshold: 0, rootMargin: '40px 0px 0px 0px' });

      document.querySelectorAll('.reveal').forEach((el, i) => {
        el.style.animation = 'none';
        el.style.transitionDelay = `${Math.min(i * 0.06, 0.45)}s`;
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight + 40) {
          el.classList.add('visible');
        } else {
          observer.observe(el);
        }
      });
    } catch (err) { console.error('Reveal error:', err); }
  </script>
