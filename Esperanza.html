<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Esperanza | Hogwarts Edition</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:system-ui;

background:url("bg.png") no-repeat center center;
background-size:cover;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;
}

/* main wrapper */

.wrapper{

width:100%;
max-width:700px;

display:flex;
flex-direction:column;
gap:20px;

}

/* header image */

.header{

width:100%;
text-align:center;
}

.header img{
padding:30px;
width:330px;
max-width:90%;
}

/* brochure special */

.brochure{

border-radius:12px;
overflow:hidden;

box-shadow:0 10px 25px rgba(0,0,0,0.35);
transition:.3s;
}

.brochure img{
width:100%;
display:block;
}

.brochure:hover{

transform:scale(1.03);

box-shadow:0 18px 40px rgba(0,0,0,0.5);
}

/* grid */

.container{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;

}

/* event cards */

.event{

border-radius:12px;
overflow:hidden;

box-shadow:0 10px 25px rgba(0,0,0,0.35);

transition:all .35s ease;
}

.event img{

width:100%;
display:block;
}

/* hover */

.event:hover{

transform:translateY(-4px) scale(1.03);

box-shadow:0 18px 40px rgba(0,0,0,0.5);
}

/* mobile */

@media(max-width:600px){

.container{

grid-template-columns:1fr;
justify-items:center;

}

.event{
max-width:320px;   /* makes images smaller on mobile */
}

.brochure{
max-width:340px;
margin:auto;
}

body{
padding:18px;
}

}

</style>

</head>

<body>

<div class="wrapper">

<!-- header -->
<div class="header">
<img src="esperanza.png">
</div>

<!-- brochure -->
<a href="brochure.pdf" class="brochure">
<img src="brochure.png">
</a>

<!-- events -->
<div class="container">

<a href="https://forms.gle/music" class="event">
<img src="music.png">
</a>

<a href="https://forms.gle/dance" class="event">
<img src="dance.png">
</a>

<a href="https://forms.gle/drama" class="event">
<img src="drama.png">
</a>

<a href="https://forms.gle/fashion" class="event">
<img src="fashion.png">
</a>

<a href="https://forms.gle/art" class="event">
<img src="art.png">
</a>

<a href="https://forms.gle/quiz" class="event">
<img src="quiz.png">
</a>

<a href="https://forms.gle/media" class="event">
<img src="media.png">
</a>

<a href="https://forms.gle/media" class="event">
<img src="8.png">
</a>

<a href="https://forms.gle/media" class="event">
<img src="9.png">
</a>

<a href="https://forms.gle/media" class="event">
<img src="11.png">
</a>

</div>

</div>

</body>
</html>
