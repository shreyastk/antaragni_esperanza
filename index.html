<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esperanza | Hogwarts Edition — Antaragni X Esperanza</title>
  <meta name="description"
    content="Esperanza – the Hogwarts Edition cultural fest by Antaragni. Register for events in Music, Dance, Drama, Fashion, Art, Quiz, and more.">

  <!-- Canonical & mobile theme -->
  <link rel="canonical" href="https://antaragni-esperanza.pages.dev/">
  <meta name="theme-color" content="#120a1f">

  <!-- Open Graph – rich previews on WhatsApp / Instagram / Telegram -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://antaragni-esperanza.pages.dev/">
  <meta property="og:title" content="Esperanza | Hogwarts Edition — Antaragni X Esperanza">
  <meta property="og:description"
    content="Register for Music, Dance, Drama, Fashion, Art, Quiz &amp; more at Esperanza – Hogwarts Edition by Antaragni, DSATM.">
  <meta property="og:image" content="https://antaragni-esperanza.pages.dev/brochure.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:alt" content="Esperanza Hogwarts Edition Brochure">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --cream: #f5edd6;
      --dark: #120a1f;
      --card-bg: rgba(18, 10, 31, 0.55);
    }

    body {
      font-family: 'Lato', sans-serif;
      background: url("bg.png") no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px 60px;
      position: relative;
    }

    /* Dark gradient overlay for readability */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg,
          rgba(10, 4, 22, 0.72) 0%,
          rgba(30, 10, 50, 0.60) 50%,
          rgba(10, 4, 22, 0.80) 100%);
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding-bottom: 6px;
    }

    .header img {
      width: 300px;
      max-width: 88%;
      filter: drop-shadow(0 4px 24px rgba(201, 168, 76, 0.45));
      animation: floatLogo 4s ease-in-out infinite;
    }

    @keyframes floatLogo {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .tagline {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: var(--gold-light);
      text-transform: uppercase;
      opacity: 0.85;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
    }

    /* ── BROCHURE ── */
    .brochure-label {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-align: center;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: -14px;
    }

    .brochure {
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55), 0 0 0 1.5px rgba(201, 168, 76, 0.25);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      display: block;
      position: relative;
    }

    .brochure::after {
      content: '↗ View Brochure';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: linear-gradient(to top, rgba(10, 4, 22, 0.85), transparent);
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .brochure:hover::after {
      opacity: 1;
    }

    .brochure img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
    }

    .brochure:hover {
      transform: scale(1.025);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(201, 168, 76, 0.5);
    }

    .brochure:hover img {
      transform: scale(1.03);
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-align: center;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: -8px;
    }

    /* ── EVENT GRID ── */
    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .event {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(201, 168, 76, 0.15);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      display: block;
      position: relative;
    }

    .event::after {
      content: 'Register ↗';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px;
      background: linear-gradient(to top, rgba(10, 4, 22, 0.88), transparent);
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .event:hover::after {
      opacity: 1;
    }

    .event img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
    }

    .event:hover {
      transform: translateY(-5px) scale(1.025);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.65), 0 0 0 2px rgba(201, 168, 76, 0.45);
    }

    .event:hover img {
      transform: scale(1.05);
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      color: var(--gold-light);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      opacity: 0.5;
      padding-top: 4px;
      font-family: 'Cinzel', serif;
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      body {
        padding: 24px 14px 50px;
      }

      .container {
        grid-template-columns: 1fr;
      }

      .event {
        max-width: 340px;
        margin: auto;
      }

      .brochure {
        max-width: 360px;
        margin: auto;
      }
    }
  </style>
</head>

<body>
